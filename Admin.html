<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="jquery-1.12.0.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.0/jquery.min.js"></script>
    <script src="http://ajax.aspnetcdn.com/ajax/jQuery/jquery-1.12.0.min.js"></script>
    <link rel="stylesheet" href="Form.css">
</head>
<body>
    <div>
         <nav class="nav-links"> 
            <h1 class="h1" style="margin: auto; text-align: center; color: #ffffff; font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">Welcome To Abundant Grace School</h1>
    </nav>
    </div>
    

    <!--Login Form-->
    <div class="AdmiLogin" style="margin-top: 230px;" id="Adminlogin">
        <h2 style="color:blue; font-size: larger;"> Admin Login</h2>
        <form action="#" method="post">
            <label for="Username">Username</label>
            <input type="username" id="username" name="username" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required><br><br>
   
            <button type="submit" id="login">Login</button><br><br>
            <button type="reset" style="background-color:yellow;color:#ffffff; cursor: pointer;">Forget Password</button><br><br>
            <button type="sign up" id="sign up">Sign up</button>
        </form>
    </div>
    <!--Style Element-->
    <style>
        body{
            margin: 0;
            padding: 0
            
        }
        .nav-links{
           background-color: blue;
           width: 100%;
           height: 3rem; 
           margin-top: auto;
          
        }
        a{
            color: white;
            text-decoration: none;
            display: inline-block;
            padding: 15px 20px;
            font-size: medium;
            font-family: Arial, Helvetica, sans-serif;
            float: right;
            
        }
        a:hover{
            color: rgb(230, 208, 12) !important;
        }
         
        .AdmiLogin{
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 1);
            
        }

        
        h2{
            text-align: center;
            margin-bottom: 20px;
        }
        label{
            display: block;
            margin: 10px 0 5px;
            align-items: center;
        }
        input[type="username"],input[type="password"]{
           width: 100%;
           padding: 10px;
           margin-bottom: 15px;
           border-radius: 3px;
           border: 2px solid #222020;
           box-sizing: border-box;
        }

        button{
            width: 100%;
            padding: 10px;
            background-color: blue;
            color:#ffffff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;

        }

        button:hover{
            color: #8c56c4;
        }
    </style>
    <!--Ends Of Styling-->
    
   
    <!--Login Form-->
  

</body>

</Script>

</html>
